<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>RIKYULOU | TOKYO EST. 2026</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        /* 1. 背景加入缓慢缩放的“呼吸感” */
        .hero-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('https://images.unsplash.com/photo-1540331547168-8b63109225b7?q=80&w=2560&auto=format&fit=crop'); 
            background-size: cover; background-position: center; filter: brightness(0.6); z-index: -1; 
            /* 初始状态稍微放大 */
            transform: scale(1.08);
            /* 持续10秒的平滑缩小动画 */
            animation: bgBreath 10s ease-out forwards;
        }
        
        .header { position: fixed; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between; box-sizing: border-box; backdrop-filter: blur(10px); z-index: 100;}
        
        /* LOGO 简单的淡入 */
        .logo { font-weight: bold; letter-spacing: 2px; text-decoration: none; color: #fff; opacity: 0; animation: simpleFadeIn 1s ease forwards 0.2s;}
        
        .main { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10;}
        
        /* 2. 主标题：镜头失焦到聚焦的电影级入场 */
        .title { 
            font-size: 4rem; font-weight: 100; text-transform: uppercase; margin: 0; 
            opacity: 0; 
            /* 核心动画：cubic-bezier 提供丝滑的减速感 */
            animation: cinematicTitle 1.5s cubic-bezier(0.2, 1, 0.3, 1) forwards 0.3s; 
        }
        
        /* 副标题：我帮你把行内样式提出来了，方便做延时动画 */
        .subtitle { 
            color: rgba(255,255,255,0.7); 
            opacity: 0; 
            animation: cinematicSubtitle 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards 0.8s; 
        }

        /* 3. 按钮：从下方优雅上浮 */
        .cta-btn { 
            margin-top: 40px; padding: 15px 45px; border: 1px solid #fff; color: #fff; text-decoration: none; letter-spacing: 2px; transition: 0.3s; 
            opacity: 0; 
            animation: fadeUp 1s cubic-bezier(0.2, 1, 0.3, 1) forwards 1.2s;
        }
        .cta-btn:hover { background: #fff; color: #000; }

        /* ================= 动画库 ================= */
        @keyframes bgBreath {
            100% { transform: scale(1); }
        }
        @keyframes cinematicTitle { 
            0% { opacity: 0; filter: blur(12px); letter-spacing: 30px; transform: translateY(20px); } 
            100% { opacity: 1; filter: blur(0); letter-spacing: 15px; transform: translateY(0); } 
        }
        @keyframes cinematicSubtitle { 
            0% { opacity: 0; filter: blur(8px); letter-spacing: 8px; transform: translateY(15px); } 
            100% { opacity: 1; filter: blur(0); letter-spacing: 4px; transform: translateY(0); } 
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes simpleFadeIn {
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <header class="header">
        <a href="index.html" class="logo">RIKYULOU</a>
    </header>
    <div class="main">
        <h1 class="title">RIKYU LOU</h1>
        <p class="subtitle">BESPOKE SERVICES & CONSULTING / TOKYO</p>
        <a href="services.html" class="cta-btn">咨询服务 / SERVICES</a>
    </div>

    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if(e.keyCode == 123) { e.preventDefault(); } // F12
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) { e.preventDefault(); } // 开发者工具
            if(e.ctrlKey && e.keyCode == 85) { e.preventDefault(); } // 查看源代码
        });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); }); // 禁复制
        document.addEventListener('dragstart', function(e) { e.preventDefault(); }); // 禁拖拽
    </script>
</body>
</html>
