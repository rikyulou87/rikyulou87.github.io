<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>RIKYULOU | TOKYO EST. 2026</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; overflow: hidden; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
                   background-image: url('https://images.unsplash.com/photo-1540331547168-8b63109225b7?q=80&w=2560&auto=format&fit=crop'); 
                   background-size: cover; background-position: center; filter: brightness(0.6); z-index: -1; }
        .header { position: fixed; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between; box-sizing: border-box; backdrop-filter: blur(10px); }
        .logo { font-weight: bold; letter-spacing: 2px; text-decoration: none; color: #fff; }
        .main { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .title { font-size: 4rem; font-weight: 100; letter-spacing: 15px; text-transform: uppercase; margin: 0; animation: fadeIn 1.5s ease; }
        .cta-btn { margin-top: 40px; padding: 15px 45px; border: 1px solid #fff; color: #fff; text-decoration: none; letter-spacing: 2px; transition: 0.3s; }
        .cta-btn:hover { background: #fff; color: #000; }
        @keyframes fadeIn { from { opacity: 0; letter-spacing: 30px; } to { opacity: 1; letter-spacing: 15px; } }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <header class="header">
        <a href="index.html" class="logo">RIKYULOU</a>
    </header>
    <div class="main">
        <h1 class="title">RIKYU LOU</h1>
        <p style="letter-spacing: 4px; color: rgba(255,255,255,0.7);">BESPOKE SERVICES & CONSULTING / TOKYO</p>
        <a href="services.html" class="cta-btn">咨询服务 / SERVICES</a>
    </div>
</body>
</html>
